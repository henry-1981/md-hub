<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    font-family: 'Pretendard', -apple-system, sans-serif;
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 120px;
  }
  h1 {
    font-size: 72px;
    font-weight: 800;
    margin-bottom: 56px;
    background: linear-gradient(90deg, #f43f5e, #fb923c, #facc15);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 60px rgba(244, 63, 94, 0.3);
  }
  p.subtitle {
    font-size: 32px;
    color: #cbd5e1;
    max-width: 1200px;
    text-align: center;
    line-height: 1.5;
  }
  .badge {
    margin-top: 72px;
    padding: 16px 40px;
    background: linear-gradient(135deg, rgba(244, 63, 94, 0.25), rgba(251, 146, 60, 0.25));
    border: 1.5px solid rgba(244, 63, 94, 0.5);
    border-radius: 999px;
    font-size: 22px;
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.5px;
    box-shadow: 0 0 30px rgba(244, 63, 94, 0.2), 0 0 60px rgba(251, 146, 60, 0.1);
  }
</style>
</head>
<body>
  <h1>AI Edit Test Slide-1</h1>
  <p class="subtitle" style="position: relative; width: 1136px; height: 128px; left: 64px; top: 0px; font-size: 32px;">당신의 아이디어를 단 한 번의 클릭으로 완성된 프레젠테이션으로. AI가 디자인하고, 당신은 이야기에만 집중하세요.</p>
  <div class="badge">Test Presentation</div>


</body></html>
